apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    app: tender-mongo
spec:
  ports:
    - port: 27017
  clusterIP: None # Headless service for StatefulSet
  selector:
    app: tender-mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: "mongo"
  replicas: 1
  selector:
    matchLabels:
      app: tender-mongo
  template:
    metadata:
      labels:
        app: tender-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
          name: mongo
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi # Keep it small for free tier
