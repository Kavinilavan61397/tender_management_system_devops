version: '3.8'

services:
  db:
    image: mongo:7
    container_name: tender-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build: 
      context: ./tender_management_System_server
      dockerfile: Dockerfile
    container_name: tender-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/tender-management
      - JWT_SECRET=supersecretkey_for_local_dev
      - CORS_ORIGIN=http://localhost:80
      - CLIENT_URL=http://localhost:80
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: ./tender_management_System_client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: tender-client
    ports:
      - "80:80"
    volumes:
      - ./tender_management_System_client/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
