name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Server Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tender-server:latest ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/tender-server:latest

      - name: Build & Push Client Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tender-client:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/tender-client:latest

      - name: Create app directory on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/tender-app

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/tender-app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tender-app
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/tender-server:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/tender-client:latest
            docker compose down
            docker compose up -d
