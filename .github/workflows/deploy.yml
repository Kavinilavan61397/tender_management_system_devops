name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Server Image
      - name: Build Server Image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/tender-server:${{ github.sha }} ./tender_management_System_server
          docker tag ${{ env.DOCKER_USERNAME }}/tender-server:${{ github.sha }} ${{ env.DOCKER_USERNAME }}/tender-server:latest

      # Run Trivy Vulnerability Scanner on Server
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/tender-server:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Set to 1 if you want to fail the build on high/critical vulns
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build Client Image
      - name: Build Client Image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/tender-client:${{ github.sha }} ./tender_management_System_client
          docker tag ${{ env.DOCKER_USERNAME }}/tender-client:${{ github.sha }} ${{ env.DOCKER_USERNAME }}/tender-client:latest

      # Push Images
      - name: Push Images to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.DOCKER_USERNAME }}/tender-server:${{ github.sha }}
          docker push ${{ env.DOCKER_USERNAME }}/tender-server:latest
          docker push ${{ env.DOCKER_USERNAME }}/tender-client:${{ github.sha }}
          docker push ${{ env.DOCKER_USERNAME }}/tender-client:latest

  deploy:
    needs: build-and-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Kubernetes Manifests with Image Tags
        run: |
          sed -i 's|DOCKER_USERNAME/tender-server:latest|${{ env.DOCKER_USERNAME }}/tender-server:${{ github.sha }}|g' k8s/server.yaml
          sed -i 's|DOCKER_USERNAME/tender-client:latest|${{ env.DOCKER_USERNAME }}/tender-client:${{ github.sha }}|g' k8s/client.yaml

      - name: Deploy to K3s Cluster
        run: |
          kubectl apply -f k8s/db.yaml
          kubectl apply -f k8s/server.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/client.yaml
          
      - name: Verify Deployment
        run: |
          kubectl get all
